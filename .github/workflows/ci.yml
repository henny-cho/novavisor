name: NovaVisor Bare-Metal CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: external/cache
          key: cpm-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build clang-tidy clang-format qemu-system-arm wget xz-utils
          ./scripts/setup_env.sh

      - name: Check formatting
        run: scripts/task.sh format --check

      - name: Build
        run: scripts/task.sh build --release

      - name: Lint
        run: scripts/task.sh lint --release

      - name: Host unit tests
        run: scripts/task.sh test
