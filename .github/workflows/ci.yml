name: NovaVisor Bare-Metal CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# A newer push to the same branch or PR supersedes the in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast-feedback lane: formatting + native GTest suite. Needs neither the
  # ARM toolchain nor QEMU, so it reports within a couple of minutes.
  host:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Cache CPM packages
        uses: actions/cache@v6
        with:
          path: external/cache
          # Dependency pins live in CMakeLists.txt AND cmake/ (get_cpm.cmake,
          # cib_cpm_pin.cmake), so both must key the cache.
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: cpm-

      - name: Install dependencies
        # The distro clang-format (v18 on noble) disagrees with the pinned
        # v20 on wrapping rules; install the pinned version via pipx.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build
          source scripts/versions.sh
          pipx install "clang-format==${CLANG_FORMAT_VERSION}"

      - name: Check formatting
        run: scripts/task.sh format --check

      - name: Host unit tests
        run: scripts/task.sh test

  # Cross lane: Release build, clang-tidy, and QEMU demo verification.
  target:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Cache CPM packages
        uses: actions/cache@v6
        with:
          path: external/cache
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: cpm-

      - name: Cache ARM toolchain
        # setup_env.sh skips the ~700 MB download when the extracted
        # toolchain is already present.
        uses: actions/cache@v6
        with:
          path: .toolchain
          key: toolchain-${{ runner.os }}-${{ hashFiles('scripts/versions.sh') }}

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ccache
          key: ccache-${{ github.sha }}
          restore-keys: ccache-

      - name: Install dependencies and ARM toolchain
        run: ./scripts/setup_env.sh --ci

      - name: Build (Release)
        run: scripts/task.sh build --release

      - name: Lint
        # run-clang-tidy over the debug tree's compile database; the debug
        # objects are reused by the demo step below.
        run: scripts/task.sh lint

      - name: Demo verification (enabled demos only)
        # Each completed phase flips its demo's `enabled` flag to true,
        # making this step the phase's acceptance gate.
        run: scripts/task.sh demo verify-all

      - name: Upload demo artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: demo-artifacts
          path: |
            build/demo/**/*.bin
            build/demo/**/*.elf
          if-no-files-found: ignore

  # Aggregate gate: one stable status-check name for branch protection,
  # independent of how the jobs above are split or renamed.
  ci:
    if: always()
    needs: [host, target]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify all jobs passed
        run: |
          test "${{ needs.host.result }}" = "success"
          test "${{ needs.target.result }}" = "success"
