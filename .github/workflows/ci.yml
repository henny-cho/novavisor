name: NovaVisor Bare-Metal CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: external/cache
          key: cpm-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cpm-

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build clang-tidy clang-format \
            qemu-system-arm qemu-system-aarch64 \
            wget xz-utils \
            python3-yaml python3-pexpect
          ./scripts/setup_env.sh

      - name: Check formatting
        run: scripts/task.sh format --check

      - name: Build
        run: scripts/task.sh build --release

      - name: Lint
        run: scripts/task.sh lint --release

      - name: Host unit tests
        run: scripts/task.sh test

      - name: Demo verification (enabled demos only)
        # Before Phase 5 lands, every demo has `enabled: false` in its
        # manifest, so this step prints "no enabled demos" and exits 0.
        # Each completed phase flips its demo's `enabled` flag to true
        # and this step becomes the phase's acceptance gate.
        run: scripts/task.sh demo verify-all

      - name: Upload demo artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-artifacts
          path: |
            build/demo/**/*.bin
            build/demo/**/*.elf
          if-no-files-found: ignore
