name: DMA Recovery Soak

on:
  schedule:
    - cron: "47 18 * * *"
  workflow_dispatch:
    inputs:
      runs:
        description: Number of DMA recovery attempts
        required: true
        default: "10"
        type: choice
        options:
          - "10"
          - "20"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  repeat:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    env:
      SOAK_RUNS: ${{ github.event.inputs.runs || '10' }}
      SOAK_DIR: build/dma-recovery-soak
    steps:
      - uses: actions/checkout@v7

      - name: Cache CPM packages
        uses: actions/cache@v6
        with:
          path: external/cache
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/*.cmake') }}
          restore-keys: cpm-

      - name: Cache ARM toolchain
        uses: actions/cache@v6
        with:
          path: .toolchain
          key: toolchain-${{ runner.os }}-${{ hashFiles('scripts/versions.sh') }}

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ccache
          key: ccache-dma-soak-${{ github.sha }}
          restore-keys: ccache-dma-soak-

      - name: Install dependencies and ARM toolchain
        run: ./scripts/setup_env.sh --ci

      - name: Repeat DMA recovery
        id: soak
        run: |
          mkdir -p "${SOAK_DIR}"
          set -o pipefail
          scripts/task.sh demo verify-repeat 15 \
            --runs "${SOAK_RUNS}" \
            --summary "${SOAK_DIR}/summary.csv" \
            --artifacts "${SOAK_DIR}" \
            2>&1 | tee "${SOAK_DIR}/runner.log"

      - name: Publish repeat summary
        if: always()
        run: |
          if [ -f "${SOAK_DIR}/summary.csv" ]; then
            total=$(awk -F, 'NR > 1 { count++ } END { print count + 0 }' "${SOAK_DIR}/summary.csv")
            passed=$(awk -F, 'NR > 1 && $2 == "pass" { count++ } END { print count + 0 }' "${SOAK_DIR}/summary.csv")
            elapsed=$(awk -F, 'NR > 1 { total += $3 } END { printf "%.1f", total }' "${SOAK_DIR}/summary.csv")
            rate=$(awk -v passed="${passed}" -v total="${total}" \
              'BEGIN { printf "%.1f", total == 0 ? 0 : 100 * passed / total }')
            result="${passed}/${total} passed (${rate}%), total ${elapsed}s"
          else
            result="No attempts completed."
          fi
          {
            echo "## DMA recovery soak"
            echo
            echo "**Result:** ${result}"
            echo
            echo '```csv'
            if [ -f "${SOAK_DIR}/summary.csv" ]; then
              cat "${SOAK_DIR}/summary.csv"
            else
              echo "No attempts completed."
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Record failure artifact metadata
        if: always() && steps.soak.outcome == 'failure'
        run: |
          mkdir -p "${SOAK_DIR}"
          {
            git rev-parse HEAD
            qemu-system-aarch64 --version | head -n 1
            aarch64-none-elf-gcc --version | head -n 1
          } > "${SOAK_DIR}/environment.txt"
          for artifact in \
            build/demo-repeat/15_dma_isolation/variant-1/novavisor.elf \
            build/demo/15_dma_isolation/dma_isolation.bin \
            build/aarch64-debug/active_config.yml \
            build/aarch64-debug/guest_dtb/guest0.dtb
          do
            if [ -f "${artifact}" ]; then
              sha256sum "${artifact}"
            fi
          done > "${SOAK_DIR}/sha256sums.txt"

      - name: Upload failure evidence
        if: always() && steps.soak.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: dma-recovery-soak-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: error
          path: |
            build/dma-recovery-soak/
            build/demo-repeat/15_dma_isolation/variant-1/novavisor.elf
            build/demo/15_dma_isolation/dma_isolation.bin
            build/aarch64-debug/active_config.yml
            build/aarch64-debug/guest_dtb/guest0.dtb
