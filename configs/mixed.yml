# Mixed-criticality pair: Zephyr (RT) pinned to core 0, Linux (GP)
# pinned to core 1 and auto-started. Packed PA puts Linux at
# 0x50800000 (manifest load_addr must match). The verifier drives the
# first-boot load and panic through the focused virtual UART.
guests:
  - name: zephyr
    memory_size: 0x00800000
    vcpus: 1
    uart: vuart
  - name: linux
    memory_size: 0x08000000
    vcpus: 1
    uart: vuart
    cores: [1]
    autostart: true
    bootargs: "console=ttyAMA0 panic=-1"
