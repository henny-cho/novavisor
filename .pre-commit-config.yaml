repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]

  # clang-tidy is NOT run as a pre-commit hook.
  # Reason: cross-compilation requires --target=aarch64-none-elf and -isystem
  # paths that are only available after cmake configuration; a per-file hook
  # cannot replicate the CMake-integrated invocation reliably.
  # Use: scripts/task.sh lint
