name: "17_edu_dma"
description: "The owner guest submits a two-way EDU DMA transfer and completes both level interrupts."
phase: 21
enabled: true
timeout_seconds: 20

config: "configs/dma.yml"
qemu_devices:
  - "edu,bus=pcie.0,addr=2.0,dma_mask=0xffffffffff"

forbid:
  - "edu dma: identity mismatch"
  - "edu dma: round-trip failed"
  - "unhandled physical IRQ"
  - "demo_exit code=[1-9]"

guests:
  - name: "edu_dma"
    binary: "edu_dma.bin"
    load_addr:   0x50000000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x00100000
    vcpus: 1

expect:
  - pattern: "\\[dma\\] EDU isolation probe passed"
    within_seconds: 10
  - pattern: "\\[dma\\] VM 0 resumed generation 2"
    within_seconds: 5
  - pattern: "edu dma: direct round-trip and 2 irqs ok"
    within_seconds: 5
  - pattern: "demo_exit code=0"
    within_seconds: 5
  - pattern: "\\[dma\\] VM 0 quiesced"
    within_seconds: 5
