name: "12_zephyr"
description: "Pinned Zephyr emits a low-rate heartbeat as a guest, validating sustained real-OS execution without flooding CI logs."
phase: 16
enabled: true
timeout_seconds: 60

config: "configs/zephyr.yml"

# External image: fetch.sh builds the pinned Zephyr release into
# external/cache/guests/12_zephyr/ (run `task.sh demo fetch 12` once).
# RAM placement comes from novavisor.overlay, so link base == slot 0.
guests:
  - name: "zephyr"
    binary: "zephyr.bin"
    load_addr:   0x50000000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x00800000
    vcpus: 1
    uart: vuart

# The heartbeat never exits and emits one line every five seconds.
expect:
  - pattern: "Booting Zephyr OS build"
    within_seconds: 30
  - pattern: "NOVA ZEPHYR HEARTBEAT 1"
    within_seconds: 10
  - pattern: "NOVA ZEPHYR HEARTBEAT 2"
    within_seconds: 10
  - pattern: "NOVA ZEPHYR HEARTBEAT 3"
    within_seconds: 10
