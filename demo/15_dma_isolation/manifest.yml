name: "15_dma_isolation"
description: "A guest-owned PCI stream is quarantined, reattached, faulted at runtime, and recovered by generation."
phase: 19
enabled: true
timeout_seconds: 20

config: "configs/dma.yml"
qemu_devices:
  - "edu,bus=pcie.0,addr=2.0,dma_mask=0xffffffffff"

guests:
  - name: "dma_isolation"
    binary: "dma_isolation.bin"
    load_addr:   0x50000000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x00100000
    vcpus: 1

expect:
  - pattern: "\\[dma\\] EDU round-trip ok"
    within_seconds: 10
  - pattern: "\\[smmu\\] fault type=0x0*10 sid=16 iova=0x0*50100000"
    within_seconds: 5
  - pattern: "\\[dma\\] EDU isolation probe passed"
    within_seconds: 5
  - pattern: "dma lifecycle boot 1"
    within_seconds: 5
  - pattern: "\\[dma\\] VM 0 resumed generation 2"
    within_seconds: 5
  - pattern: "dma lifecycle boot 2"
    within_seconds: 5
  - pattern: "\\[dma\\] runtime fault requested"
    within_seconds: 5
  - pattern: "\\[smmu\\] fault type=0x0*10 sid=16 iova=0x0*50100000"
    within_seconds: 5
  - pattern: "\\[smp\\] DMA fault in VM 0 sid 16 generation 2"
    within_seconds: 5
  - pattern: "\\[dma\\] VM 0 resumed generation 3"
    within_seconds: 5
  - pattern: "dma lifecycle boot 3"
    within_seconds: 5
  - pattern: "demo_exit code=0"
    within_seconds: 5
  - pattern: "\\[dma\\] VM 0 quiesced"
    within_seconds: 5
  - pattern: "\\[smp\\] VM 0 stopped"
    within_seconds: 5
