name: "15_dma_isolation"
description: "A PCI DMA stream succeeds inside its owner window, faults outside it, and remains blocked after quarantine."
phase: 19
enabled: true
timeout_seconds: 20

config: "configs/dma.yml"
qemu_devices:
  - "edu,bus=pcie.0,addr=2.0,dma_mask=0xffffffffff"

guests:
  - name: "dma_isolation"
    binary: "dma_isolation.bin"
    load_addr:   0x50000000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x00100000
    vcpus: 1

expect:
  - pattern: "\\[dma\\] EDU round-trip ok"
    within_seconds: 10
  - pattern: "\\[smmu\\] fault type=0x0*10 sid=16 iova=0x0*50100000"
    within_seconds: 5
  - pattern: "\\[dma\\] EDU isolation probe passed"
    within_seconds: 5
  - pattern: "dma isolation guest running"
    within_seconds: 5
  - pattern: "demo_exit code=0"
    within_seconds: 5
