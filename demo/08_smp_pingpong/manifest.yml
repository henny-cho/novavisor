name: "08_smp_pingpong"
description: "Cross-core SPSC round-trips followed by bounded guest-fault recovery while the peer remains live."
phase: 12
enabled: true
timeout_seconds: 30

# pong loads at slot 2 (0x50400000) — guest_table gives slots 2/3
# core 1 affinity, so the load address alone places it on the other
# physical core (started via ping's HVC_VM_START -> cross-call).
guests:
  - name: "ping"
    binary: "smp_ping.bin"
    load_addr:   0x50000000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x00100000
    vcpus: 1
  - name: "pong"
    binary: "smp_pong.bin"
    load_addr:   0x50400000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x00100000
    vcpus: 1

# Ping's shared run counter survives each reset. Pong remains live on
# core 1 until the fourth run, then retires before ping consumes its
# final restart attempt. The halt line therefore proves both VMs
# stopped without a machine-wide panic.
expect:
  - pattern: "core 1 online"
    within_seconds: 10
  - pattern: "pong: ready"
    within_seconds: 15
  - pattern: "smp pingpong: 1000 rounds, avg RTT="
    within_seconds: 25
  - pattern: "fault test: instruction abort"
    within_seconds: 26
  - pattern: "guest fault in VM 0 vCPU 0"
    within_seconds: 26
  - pattern: "fault test: undefined instruction"
    within_seconds: 27
  - pattern: "fault test: breakpoint"
    within_seconds: 27
  - pattern: "pong: done"
    within_seconds: 28
  - pattern: "system_off"
    within_seconds: 28
  - pattern: "ping: peer survived guest faults"
    within_seconds: 29
  - pattern: "fault test: pc alignment"
    within_seconds: 29
  - pattern: "restart budget exhausted"
    within_seconds: 29
  - pattern: "all VCPUs off"
    within_seconds: 30
