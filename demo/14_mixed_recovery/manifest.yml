name: "14_mixed_recovery"
description: "Zephyr (RT, core 0) and Linux (GP, core 1) run side by side; Linux takes load, panics itself and warm-resets while Zephyr never stops — mixed criticality and autonomous recovery in one run."
phase: 18
enabled: true
# Two Linux boots plus a 20 s load window. The low-rate Zephyr heartbeat
# proves the RT VM remains scheduled without dominating CI output.
timeout_seconds: 180

config: "configs/mixed.yml"

# External images assembled by fetch.sh from the 12/13 pipelines
# (run `task.sh demo fetch 14` once). Linux sits at the packed PA
# slot after Zephyr's 8 MiB window.
guests:
  - name: "zephyr"
    binary: "zephyr.bin"
    load_addr:   0x50000000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x00800000
    vcpus: 1
    uart: vuart
  - name: "linux"
    binary: "Image"
    load_addr:   0x50800000
    ipa_base:    0x50000000
    entry:       0x50000000
    memory_size: 0x08000000
    vcpus: 1
    uart: vuart

# The verifier focuses Linux after its first shell prompt, starts its
# load-and-panic helper, then observes an autonomous warm reset.
# Zephyr heartbeats must continue during the Linux load and recovery.
expect:
  - pattern: "Booting Zephyr OS build"
    within_seconds: 60
  - pattern: "Booting Linux on physical CPU"
    within_seconds: 60
  - pattern: "aarch64 GNU/Linux"
    within_seconds: 60
  - pattern: "~ #"
    within_seconds: 30
    send: "\u0014"
  - pattern: "\\[mux\\] focus vm1"
    within_seconds: 5
    send: "nova-mixed\n"
  - pattern: "\\[vm1\\] NOVA MIXED BOOT 1"
    within_seconds: 10
  - pattern: "\\[vm1\\] NOVA LOAD START"
    within_seconds: 10
  - pattern: "NOVA ZEPHYR HEARTBEAT \\d+"
    within_seconds: 30
  - pattern: "NOVA ZEPHYR HEARTBEAT \\d+"
    within_seconds: 30
  - pattern: "\\[vm1\\] NOVA LOAD DONE"
    within_seconds: 60
  - pattern: "sysrq: Trigger a crash"
    within_seconds: 30
  - pattern: "Booting Linux on physical CPU"
    within_seconds: 120
  - pattern: "aarch64 GNU/Linux"
    within_seconds: 60
  - pattern: "~ #"
    within_seconds: 30
  - pattern: "NOVA ZEPHYR HEARTBEAT \\d+"
    within_seconds: 30
